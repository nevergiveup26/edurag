[database]
# MySQL配置
mysql_host = ${MYSQL_HOST:localhost}
mysql_port = ${MYSQL_PORT:3306}
mysql_user = ${MYSQL_USER:root}
mysql_password = ${MYSQL_PASSWORD:123456}
mysql_database = ${MYSQL_DATABASE:edurag_db}
mysql_charset = utf8mb4

# Milvus配置
milvus_host = ${MILVUS_HOST:localhost}
milvus_port = ${MILVUS_PORT:19530}
milvus_collection = edurag_collection
milvus_embedding_dim = 1024
# 嵌入模型: 云端 DashScope text-embedding-v4 (1024维)
# embedding_model = D:/EduRAG智慧问答系统/model/Qwen3-Embedding-0.6B
milvus_index_type = IVF_FLAT
milvus_metric_type = IP

# Redis配置
redis_host = ${REDIS_HOST:localhost}
redis_port = ${REDIS_PORT:6379}
redis_password = 
redis_db = 0
redis_ttl = 3600

[llm]
model_name = qwen-max
api_base = https://dashscope.aliyuncs.com/compatible-mode/v1
# api_key 优先从环境变量 DASHSCOPE_API_KEY 读取，也可通过 LLM_API_KEY 设置
api_key = ${DASHSCOPE_API_KEY}
temperature = 0.7
max_tokens = 2000
top_p = 0.9
timeout = 60

[embedding]
# 嵌入模型提供商: dashscope (云端, 推荐) 或 local (本地)
provider = dashscope
# 云端嵌入模型 (DashScope text-embedding-v4, 1024维, 中文最优)
cloud_model = text-embedding-v4
# 本地嵌入模型配置 (仅 provider=local 时生效)
# local_model_path = D:/EduRAG智慧问答系统/model/Qwen3-Embedding-0.6B
# API 地址和 Key 默认复用 [llm] 中的配置，也可在此独立设置
# api_base = 
# api_key = 
# 每次 API 请求的最大文本数
batch_size = 10
# 嵌入向量维度
embedding_dim = 1024

[retriever]
top_k = 5
# FAQ相似度阈值（≥0.85直接返回FAQ答案）
similarity_threshold = 0.85
bm25_weight = 0.3
vector_weight = 0.7
rerank_enabled = true
rerank_top_k = 3

[langfuse]
# Langfuse 全链路追踪配置（https://langfuse.com）
# 环境变量: LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST
enabled = true
host = https://us.cloud.langfuse.com
# public_key 和 secret_key 请通过环境变量设置，不要硬编码在配置文件中

[system]
app_name = EduRAG智慧问答系统
debug = false
log_level = INFO
log_file = logs/app.log
max_concurrent_requests = 10
request_timeout = 30

[dashscope]
# 阿里云 DashScope 配置（OCR / Embedding / LLM 共用）
# api_key 优先从环境变量 DASHSCOPE_API_KEY 读取
api_key = ${DASHSCOPE_API_KEY}
# OCR 模型
ocr_model = qwen-vl-ocr

[tavily]
# Tavily Search API 配置（AI 优化的搜索引擎）
# 注册地址: https://tavily.com
# api_key 优先从环境变量 TAVILY_API_KEY 读取
api_key = ${TAVILY_API_KEY}
# 默认搜索深度：basic（快速，约1.5s）/ advanced（深度，约4s，结果更全）
default_search_depth = basic
# 默认返回结果数（1-10）
default_max_results = 5